name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'ouwibos-nft/package-lock.json'

      - name: Install dependencies
        working-directory: ./ouwibos-nft
        run: npm ci

      - name: Lint
        working-directory: ./ouwibos-nft
        run: npm run lint

      - name: Run Tests
        working-directory: ./ouwibos-nft
        run: npm run test

      # Vercel deployment would typically be handled automatically by the Vercel GitHub App 
      # when merging to main, but can also be triggered manually via Vercel CLI here if needed.
